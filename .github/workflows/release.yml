name: Release
on:
  push:
    tags:
      - 'v*-zhCN-withCER'

permissions:
  actions: read
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@master
        with:
          submodules: recursive

      - name: Parse tag name
        id: tag_check
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $cleanTag = $tag -replace "-zhCN-withCER$"
          Write-Host "Current tag is $tag"
          Write-Host "Cleaned tag is $cleanTag"
          echo "CLEAN_TAG=$cleanTag" >> $env:GITHUB_OUTPUT

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --target x86_64-pc-windows-msvc --profile minimal

      - name: Distribution build
        run: cargo xtask dist
      
      - name: Rename artifact
        id: artifact_rename
        shell: pwsh
        run: |
          $newName = "jdsd_er_practice_tool_zhCN_withCER_${{ steps.tag_check.outputs.CLEAN_TAG }}.zip"
          Write-Host "New name is $newName"
          echo "NEW_NAME=$newName" >> $env:GITHUB_OUTPUT
          Rename-Item -Path "target\dist\jdsd_er_practice_tool_zhCN_withCER.zip" -NewName "$newName"
      
      - name: Extract release body from changelog
        shell: pwsh
        run: |
          $tag = "${{ steps.tag_check.outputs.CLEAN_TAG }}"
          $result = "# Changelog`n`n"
          if (Test-Path "CHANGELOG.md") {
              $content = Get-Content -Raw -Path "CHANGELOG.md" -Encoding utf8
              $escapedTag = [regex]::Escape($tag)
              # Regex matches the target H2 header (and optional date) and captures everything up to the next H2 header or EOF
              $pattern = "(?ms)(?<=^##\s+$escapedTag(?:\s+.*)?(?:\r?\n|$))(.*?)(?=\r?\n##\s|\z)"
              $match = [regex]::Match($content, $pattern)
              if ($match.Success) {
                  $result = $result + $match.Value.Trim()
              } else {
                  $result = $result + "No changelog of this version found in [CHANGELOG.md](CHANGELOG.md)."
              }
          } else {
              $result = $result + "[CHANGELOG.md](CHANGELOG.md) file not found."
          }
          Set-Content -Path "extracted_changelog.txt" -Value $result -Encoding utf8
      
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          name: Elden Ring Practice Tool ${{ steps.tag_check.outputs.CLEAN_TAG }} (zh-CN, with CER support)
          body_path: extracted_changelog.txt
          generate_release_notes: true
          files: "target/dist/${{ steps.artifact_rename.outputs.NEW_NAME }}"
